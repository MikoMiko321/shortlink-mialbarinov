<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Dashboard</h1>

<button onclick="logout()">Logout</button>


<h2>Create short link</h2>

<input id="url" placeholder="https://example.com">
<input id="alias" placeholder="custom alias (optional)">
<button onclick="create()">Create</button>

<div id="create-result"></div>



<h2>Search links</h2>

<input id="search-url" placeholder="fragment (min 4 chars)">
<button onclick="search()">Search</button>

<div id="search-result"></div>



<h2>Link statistics</h2>

<input id="stats-code" placeholder="short code">
<button onclick="stats()">Get stats</button>

<pre id="stats-result"></pre>



<h2>Update link</h2>

<input id="update-code" placeholder="short code">
<input id="update-url" placeholder="new url">
<button onclick="update()">Update</button>



<h2>Delete link</h2>

<input id="delete-code" placeholder="short code">
<button onclick="remove()">Delete</button>

<p id="delete-result"></p>



<h2>Delete unused links</h2>

<input id="cleanup-days" placeholder="days (example: 30)">
<button onclick="cleanup()">Cleanup</button>



<script src="/static/app.js"></script>

</body>
</html>
